{{define "admin/links"}}
{{template "admin/header" .}}
<div class="card">
    <h3>友链管理</h3>
    <form id="link-form">
        <input type="hidden" name="mid" id="link-mid" value=""/>
        <label>名称</label><input type="text" name="title" id="link-title"/>
        <label>URL</label><input type="text" name="url" id="link-url"/>
        <label>Logo/描述</label><input type="text" name="logo" id="link-logo"/>
        <label>排序</label><input type="number" name="sort" id="link-sort" value="0"/>
        <button type="submit" class="btn btn-primary">保存</button>
        <button type="button" class="btn btn-default" onclick="resetLink()">清空</button>
    </form>
</div>
<div class="card">
    <table>
        <thead><tr><th>名称</th><th>URL</th><th style="width:80px;">排序</th><th style="width:160px;">操作</th></tr></thead>
        <tbody>
        {{range $m := .Links}}
        <tr>
            <td>{{$m.Name}}</td><td>{{$m.Slug}}</td><td>{{$m.Sort}}</td>
            <td>
                <a class="btn btn-default btn-sm" href="javascript:;" onclick="editLink({{$m.Mid}},'{{$m.Name}}','{{$m.Slug}}','{{$m.Description}}',{{$m.Sort}})">编辑</a>
                <a class="btn btn-danger btn-sm" href="javascript:;" onclick="delLink({{$m.Mid}})">删除</a>
            </td>
        </tr>
        {{else}}<tr><td colspan="4">暂无友链</td></tr>{{end}}
        </tbody>
    </table>
</div>
<script>
    function resetLink(){ $('#link-mid').val(''); $('#link-form')[0].reset(); }
    function editLink(mid,title,url,logo,sort){ $('#link-mid').val(mid); $('#link-title').val(title); $('#link-url').val(url); $('#link-logo').val(logo); $('#link-sort').val(sort); }
    function delLink(mid){ if(!confirm('确定删除?'))return; $.post('/admin/links/delete',{mid:mid},function(r){ if(r.success){location.reload();}else{alert(r.msg||'删除失败');}}); }
    $('#link-form').submit(function(e){
        e.preventDefault();
        $.post('/admin/links/save', $(this).serialize(), function(r){ if(r.success){location.reload();}else{alert(r.msg||'保存失败');}});
    });
</script>
{{template "admin/footer" .}}
{{end}}
