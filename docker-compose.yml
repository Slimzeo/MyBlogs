services:
  blog:
    build: .
    ports:
      - "8081:8081"
    environment:
      BLOG_SESSION_SECRET: ${BLOG_SESSION_SECRET:?set BLOG_SESSION_SECRET in .env}
      BLOG_COOKIE_SECURE: ${BLOG_COOKIE_SECURE:?set BLOG_COOKIE_SECURE in .env}
      BLOG_ADMIN_USERNAME: ${BLOG_ADMIN_USERNAME:-}
      BLOG_ADMIN_EMAIL: ${BLOG_ADMIN_EMAIL:-}
      BLOG_ADMIN_INITIAL_PASSWORD: ${BLOG_ADMIN_INITIAL_PASSWORD:-}
    volumes:
      - blog_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://127.0.0.1:8081/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  blog_data:
